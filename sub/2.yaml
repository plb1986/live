# 只保留一个选择代理组
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 🇨🇳 上海移动
      - 🇨🇳 安徽移动
      - 🇨🇳 四川移动
      - 🇨🇳 河南移动
      - 🇨🇳 浙江移动
      - 🇨🇳 黑龙江移动
      - 🇨🇳 黑龙江移动2
      - 🇨🇳 江苏移动1
      - 🇨🇳 深圳移动
      - 🇨🇳 江苏移动2
      - DIRECT

# 全局模式下，所有流量都走PROXY组
rules:
  - MATCH,PROXY
    # 本地和局域网地址直连
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
