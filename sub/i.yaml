# ==================== 基础配置 ====================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 0
tproxy-port: 7893
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""
ipv6: false

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1

# ==================== 代理节点配置 ====================
proxies:
  # 香港阿里云
  - name: "🇭🇰 香港阿里云"
    type: socks5
    server: 47.57.244.4
    port: 10902
    udp: true  # 启用 UDP 支持
  
  # 上海移动
  - name: "🇨🇳 上海移动"
    type: socks5
    server: 223.112.8.106
    port: 17007
    udp: true
  
  # 四川移动
  - name: "🇨🇳 四川移动"
    type: socks5
    server: 36.133.69.144
    port: 9004
    udp: true
  
  # 四川联通
  - name: "🇨🇳 四川联通"
    type: socks5
    server: 101.237.34.76
    port: 30711
    udp: true
  
  # 江苏移动
  - name: "🇨🇳 江苏移动"
    type: socks5
    server: 36.150.108.231
    port: 10099
    udp: true
  
  # 湖南移动
  - name: "🇨🇳 湖南移动"
    type: socks5
    server: 120.226.180.139
    port: 8100
    udp: true

# ==================== 手动选择代理组 ====================
proxy-groups:
  # 唯一的代理组 - 纯手动选择
  - name: "🚀 手动选择节点"
    type: select
    proxies:
      - "🇭🇰 香港阿里云"
      - "🇨🇳 上海移动"
      - "🇨🇳 四川移动"
      - "🇨🇳 四川联通"
      - "🇨🇳 江苏移动"
      - "🇨🇳 湖南移动"
      - DIRECT

# ==================== 简单路由规则 ====================
rules:
  # 本地网络直连
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  
  # DNS 查询直连
  - DST-PORT,53,DIRECT
  
  # 国内 IP 直连
  - GEOIP,CN,DIRECT
  
  # 最终规则 - 所有其他流量走手动选择的节点
  - MATCH,🚀 手动选择节点
