# 最简单的配置
port: 0
socks-port: 10808
tun:
  enable: false

proxies:
  - name: "proxy"
    type: socks5
    server: 223.112.8.106
    port: 17007
    udp: true

proxy-groups:
  - name: "main"
    type: select
    proxies:
      - proxy
      - DIRECT

rules:
  - DOMAIN,iptvrr.sh.chinamobile.com,main
  - MATCH,DIRECT
