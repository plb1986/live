# ==================== 基础配置 ====================
port: 0  # 禁用 HTTP 代理
socks-port: 10808  # 保持和 V2Ray 相同
tun:
  enable: true  # 启用 TUN 模式
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 0.0.0.0:53

allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""
ipv6: false

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: 127.0.0.1:10853  # 对应 V2Ray 端口
  enhanced-mode: redir-host
  nameserver:
    - 223.5.5.5
  # IPTV 特殊处理
  nameserver-policy:
    "iptvrr.sh.chinamobile.com": "223.5.5.5"
    "*.sh.chinamobile.com": "223.5.5.5"
  fallback: []

# ==================== 代理节点 ====================
proxies:
  # 上海移动
  - name: "shanghai-mobile"
    type: socks5
    server: 223.112.8.106
    port: 17007
    udp: true
    skip-cert-verify: false

# ==================== 代理组 ====================
proxy-groups:
  # 只有一个代理组，手动选择
  - name: "🚀 手动选择"
    type: select
    proxies:
      - "shanghai-mobile"
      - DIRECT

# ==================== 路由规则 ====================
rules:
  # 1. 系统/本地直连（必须放在最前）
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  
  # 2. DNS 相关
  - DST-PORT,53,DIRECT
  - DST-PORT,10853,DIRECT
  
  # 3. 关键：IPTV 走代理
  - DOMAIN,iptvrr.sh.chinamobile.com,🚀 手动选择
  - DOMAIN-SUFFIX,sh.chinamobile.com,🚀 手动选择
  - DST-PORT,6060,🚀 手动选择
  
  # 4. HLS 流媒体
  - DOMAIN-KEYWORD,m3u8,🚀 手动选择
  - DOMAIN-KEYWORD,ts,🚀 手动选择
  
  # 5. 国内流量直连
  - GEOIP,CN,DIRECT
  
  # 6. 最终规则：所有其他流量走代理（这是关键！）
  - MATCH,🚀 手动选择
