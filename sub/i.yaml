mode: global  # 全局模式，所有流量都走代理
mixed-port: 7890

proxies:
  # 上海移动
  - name: "🇨🇳 上海移动"
    type: socks5
    server: 223.112.8.106
    port: 17007
    
  # 四川移动
  - name: "🇨🇳 四川移动"
    type: socks5
    server: 36.133.69.144
    port: 9004
    
  # 四川联通
  - name: "🇨🇳 四川联通"
    type: socks5
    server: 101.237.34.76
    port: 30711
    
  # 江苏移动
  - name: "🇨🇳 江苏移动"
    type: socks5
    server: 36.150.108.231
    port: 10099
    
  # 湖南移动
  - name: "🇨🇳 湖南移动"
    type: socks5
    server: 120.226.180.139
    port: 8100
    
  # 香港阿里云
  - name: "🇭🇰 香港阿里云"
    type: socks5
    server: 47.57.244.4
    port: 10902

# 只保留一个选择代理组
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 🇨🇳 上海移动
      - 🇨🇳 四川移动
      - 🇨🇳 四川联通
      - 🇨🇳 江苏移动
      - 🇨🇳 湖南移动
      - 🇭🇰 香港阿里云

# 全局模式下，所有流量都走PROXY组
rules:
  - MATCH,PROXY
    # 本地和局域网地址直连
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
