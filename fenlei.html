<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV播放列表分类器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a3a, #0f1a24);
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a3a4a;
        }
        
        h1 {
            color: #4fc3f7;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        @media (min-width: 992px) {
            .main-content {
                flex-direction: row;
            }
            
            .input-section, .output-section {
                flex: 1;
            }
        }
        
        .section {
            background: rgba(30, 40, 50, 0.8);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid #2a3a4a;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #81d4fa;
            font-size: 1.5rem;
        }
        
        .section-title i {
            font-size: 1.8rem;
        }
        
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-methods {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .method-btn {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            background: #2a3a4a;
            border: 2px solid #3a4a5a;
            border-radius: 8px;
            color: #b0b0b0;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .method-btn:hover {
            background: #3a4a5a;
            border-color: #4fc3f7;
            color: #e0e0e0;
        }
        
        .method-btn.active {
            background: #1a5a7a;
            border-color: #4fc3f7;
            color: #4fc3f7;
        }
        
        .method-btn i {
            font-size: 1.8rem;
        }
        
        textarea {
            width: 100%;
            height: 250px;
            background: #1e2a35;
            border: 1px solid #3a4a5a;
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.2);
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 24px;
            background: #2a3a4a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1;
            min-width: 160px;
        }
        
        .btn-primary {
            background: #1a5a7a;
        }
        
        .btn-primary:hover {
            background: #2078a0;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-secondary {
            background: #3a4a5a;
        }
        
        .btn-secondary:hover {
            background: #4a5a6a;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-success {
            background: #2e7d32;
        }
        
        .btn-success:hover {
            background: #388e3c;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .category {
            background: rgba(25, 35, 45, 0.9);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #3a4a5a;
        }
        
        .category-header {
            background: #2a3a4a;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .category-header:hover {
            background: #3a4a5a;
        }
        
        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
        }
        
        .category-count {
            background: #1a2a3a;
            color: #4fc3f7;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .category-content {
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        
        .category-content.active {
            display: block;
        }
        
        .channel-list {
            list-style: none;
        }
        
        .channel-item {
            padding: 12px 20px;
            border-bottom: 1px solid #2a3a4a;
            transition: background 0.2s ease;
        }
        
        .channel-item:hover {
            background: rgba(79, 195, 247, 0.1);
        }
        
        .channel-item:last-child {
            border-bottom: none;
        }
        
        .channel-name {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .channel-url {
            font-size: 0.85rem;
            color: #a0a0a0;
            font-family: monospace;
            word-break: break-all;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(25, 35, 45, 0.9);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #3a4a5a;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4fc3f7;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 5px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #2a3a4a;
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        
        .hidden {
            display: none;
        }
        
        .file-input {
            display: none;
        }
        
        .category.cctv .category-header {
            border-left: 5px solid #ff5252;
        }
        
        .category.satellite .category-header {
            border-left: 5px solid #4caf50;
        }
        
        .category.other .category-header {
            border-left: 5px solid #ff9800;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e2a35;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3a4a5a;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4a5a6a;
        }
        
        .example-text {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 10px;
            padding: 10px;
            background: rgba(30, 40, 50, 0.6);
            border-radius: 5px;
            border-left: 3px solid #4fc3f7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-satellite-dish"></i> IPTV播放列表分类器</h1>
            <p class="subtitle">上传或粘贴您的M3U播放列表，自动按央视、卫视和其他分类</p>
        </header>
        
        <main class="main-content">
            <div class="input-section">
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-file-upload"></i> 输入播放列表</h2>
                    
                    <div class="input-area">
                        <div class="input-methods">
                            <div class="method-btn active" id="paste-btn">
                                <i class="fas fa-paste"></i>
                                <span>粘贴内容</span>
                            </div>
                            <div class="method-btn" id="upload-btn">
                                <i class="fas fa-file-upload"></i>
                                <span>上传文件</span>
                            </div>
                            <div class="method-btn" id="example-btn">
                                <i class="fas fa-eye"></i>
                                <span>示例数据</span>
                            </div>
                        </div>
                        
                        <div id="paste-section">
                            <textarea id="playlist-input" placeholder="请粘贴您的M3U播放列表内容...&#10;示例格式：&#10;#EXTM3U&#10;#EXTINF:-1,CCTV-1 综合&#10;http://example.com/cctv1.m3u8&#10;#EXTINF:-1,湖南卫视&#10;http://example.com/hunan.m3u8"></textarea>
                        </div>
                        
                        <div id="upload-section" class="hidden">
                            <div class="btn btn-secondary" id="file-select-btn">
                                <i class="fas fa-folder-open"></i>
                                <span>选择M3U文件</span>
                            </div>
                            <input type="file" id="file-input" class="file-input" accept=".m3u,.m3u8">
                            <div id="file-info" class="example-text">尚未选择文件</div>
                        </div>
                        
                        <div class="buttons">
                            <button class="btn btn-primary" id="classify-btn">
                                <i class="fas fa-sitemap"></i>
                                <span>开始分类</span>
                            </button>
                            <button class="btn btn-secondary" id="reset-btn">
                                <i class="fas fa-redo"></i>
                                <span>重置</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="example-text">
                    <p><strong>说明：</strong></p>
                    <p>1. 系统会自动识别包含"CCTV"或"CGTN"的频道为央视类</p>
                    <p>2. 包含"卫视"的频道为卫视类</p>
                    <p>3. 其余频道归为其他类</p>
                </div>
            </div>
            
            <div class="output-section">
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-list-alt"></i> 分类结果</h2>
                    
                    <div class="results-container">
                        <div class="category cctv">
                            <div class="category-header">
                                <div class="category-title">
                                    <i class="fas fa-tv"></i>
                                    <span>央视频道</span>
                                </div>
                                <div class="category-count" id="cctv-count">0</div>
                            </div>
                            <div class="category-content" id="cctv-content">
                                <ul class="channel-list" id="cctv-list">
                                    <!-- 央视频道列表将通过JavaScript动态生成 -->
                                </ul>
                            </div>
                        </div>
                        
                        <div class="category satellite">
                            <div class="category-header">
                                <div class="category-title">
                                    <i class="fas fa-satellite"></i>
                                    <span>卫视频道</span>
                                </div>
                                <div class="category-count" id="satellite-count">0</div>
                            </div>
                            <div class="category-content" id="satellite-content">
                                <ul class="channel-list" id="satellite-list">
                                    <!-- 卫视频道列表将通过JavaScript动态生成 -->
                                </ul>
                            </div>
                        </div>
                        
                        <div class="category other">
                            <div class="category-header">
                                <div class="category-title">
                                    <i class="fas fa-globe"></i>
                                    <span>其他频道</span>
                                </div>
                                <div class="category-count" id="other-count">0</div>
                            </div>
                            <div class="category-content" id="other-content">
                                <ul class="channel-list" id="other-list">
                                    <!-- 其他频道列表将通过JavaScript动态生成 -->
                                </ul>
                            </div>
                        </div>
                        
                        <div class="buttons">
                            <button class="btn btn-success" id="download-btn">
                                <i class="fas fa-download"></i>
                                <span>下载分类结果</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value" id="total-channels">0</div>
                            <div class="stat-label">总频道数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="cctv-stat">0</div>
                            <div class="stat-label">央视频道</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="satellite-stat">0</div>
                            <div class="stat-label">卫视频道</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="other-stat">0</div>
                            <div class="stat-label">其他频道</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>IPTV播放列表分类器 &copy; 2023 | 自动分类央视、卫视和其他频道</p>
            <p>本工具完全在浏览器端运行，不会上传您的播放列表数据</p>
        </footer>
    </div>

    <script>
        // 示例M3U数据
        const examplePlaylist = `#EXTM3U
#EXTINF:-1 tvg-id="cctv1" tvg-name="CCTV-1" tvg-logo="http://example.com/cctv1.png" group-title="央视",CCTV-1 综合
http://example.com/cctv1.m3u8
#EXTINF:-1 tvg-id="cctv2" tvg-name="CCTV-2" tvg-logo="http://example.com/cctv2.png" group-title="央视",CCTV-2 财经
http://example.com/cctv2.m3u8
#EXTINF:-1 tvg-id="cctv3" tvg-name="CCTV-3" tvg-logo="http://example.com/cctv3.png" group-title="央视",CCTV-3 综艺
http://example.com/cctv3.m3u8
#EXTINF:-1 tvg-id="cctv4" tvg-name="CCTV-4" tvg-logo="http://example.com/cctv4.png" group-title="央视",CCTV-4 中文国际
http://example.com/cctv4.m3u8
#EXTINF:-1 tvg-id="cgtn" tvg-name="CGTN" tvg-logo="http://example.com/cgtn.png" group-title="央视",CGTN 中国国际电视台
http://example.com/cgtn.m3u8
#EXTINF:-1 tvg-id="hunan" tvg-name="湖南卫视" tvg-logo="http://example.com/hunan.png" group-title="卫视",湖南卫视
http://example.com/hunan.m3u8
#EXTINF:-1 tvg-id="zhejiang" tvg-name="浙江卫视" tvg-logo="http://example.com/zhejiang.png" group-title="卫视",浙江卫视
http://example.com/zhejiang.m3u8
#EXTINF:-1 tvg-id="jiangsu" tvg-name="江苏卫视" tvg-logo="http://example.com/jiangsu.png" group-title="卫视",江苏卫视
http://example.com/jiangsu.m3u8
#EXTINF:-1 tvg-id="dongfang" tvg-name="东方卫视" tvg-logo="http://example.com/dongfang.png" group-title="卫视",东方卫视
http://example.com/dongfang.m3u8
#EXTINF:-1 tvg-id="btv1" tvg-name="北京卫视" tvg-logo="http://example.com/btv1.png" group-title="卫视",北京卫视
http://example.com/btv1.m3u8
#EXTINF:-1 tvg-id="discovery" tvg-name="Discovery探索频道" tvg-logo="http://example.com/discovery.png" group-title="其他",Discovery探索频道
http://example.com/discovery.m3u8
#EXTINF:-1 tvg-id="nationalgeo" tvg-name="国家地理" tvg-logo="http://example.com/nationalgeo.png" group-title="其他",国家地理
http://example.com/nationalgeo.m3u8
#EXTINF:-1 tvg-id="hbo" tvg-name="HBO" tvg-logo="http://example.com/hbo.png" group-title="其他",HBO
http://example.com/hbo.m3u8
#EXTINF:-1 tvg-id="espn" tvg-name="ESPN" tvg-logo="http://example.com/espn.png" group-title="其他",ESPN体育频道
http://example.com/espn.m3u8`;

        // DOM元素引用
        const pasteBtn = document.getElementById('paste-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const exampleBtn = document.getElementById('example-btn');
        const pasteSection = document.getElementById('paste-section');
        const uploadSection = document.getElementById('upload-section');
        const playlistInput = document.getElementById('playlist-input');
        const fileInput = document.getElementById('file-input');
        const fileSelectBtn = document.getElementById('file-select-btn');
        const fileInfo = document.getElementById('file-info');
        const classifyBtn = document.getElementById('classify-btn');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        
        // 分类结果元素
        const cctvList = document.getElementById('cctv-list');
        const satelliteList = document.getElementById('satellite-list');
        const otherList = document.getElementById('other-list');
        
        // 计数元素
        const cctvCount = document.getElementById('cctv-count');
        const satelliteCount = document.getElementById('satellite-count');
        const otherCount = document.getElementById('other-count');
        const totalChannels = document.getElementById('total-channels');
        const cctvStat = document.getElementById('cctv-stat');
        const satelliteStat = document.getElementById('satellite-stat');
        const otherStat = document.getElementById('other-stat');
        
        // 分类容器元素
        const cctvContent = document.getElementById('cctv-content');
        const satelliteContent = document.getElementById('satellite-content');
        const otherContent = document.getElementById('other-content');
        
        // 切换输入方式
        pasteBtn.addEventListener('click', () => {
            pasteBtn.classList.add('active');
            uploadBtn.classList.remove('active');
            exampleBtn.classList.remove('active');
            pasteSection.classList.remove('hidden');
            uploadSection.classList.add('hidden');
        });
        
        uploadBtn.addEventListener('click', () => {
            uploadBtn.classList.add('active');
            pasteBtn.classList.remove('active');
            exampleBtn.classList.remove('active');
            uploadSection.classList.remove('hidden');
            pasteSection.classList.add('hidden');
        });
        
        exampleBtn.addEventListener('click', () => {
            exampleBtn.classList.add('active');
            pasteBtn.classList.remove('active');
            uploadBtn.classList.remove('active');
            pasteSection.classList.remove('hidden');
            uploadSection.classList.add('hidden');
            playlistInput.value = examplePlaylist;
        });
        
        // 文件选择
        fileSelectBtn.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileInfo.textContent = `已选择: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                
                // 读取文件内容
                const reader = new FileReader();
                reader.onload = (event) => {
                    playlistInput.value = event.target.result;
                };
                reader.readAsText(file);
            }
        });
        
        // 分类按钮点击事件
        classifyBtn.addEventListener('click', classifyPlaylist);
        
        // 重置按钮点击事件
        resetBtn.addEventListener('click', () => {
            playlistInput.value = '';
            clearResults();
            fileInput.value = '';
            fileInfo.textContent = '尚未选择文件';
        });
        
        // 下载按钮点击事件
        downloadBtn.addEventListener('click', downloadResults);
        
        // 分类容器点击展开/收起
        const categoryHeaders = document.querySelectorAll('.category-header');
        categoryHeaders.forEach(header => {
            header.addEventListener('click', () => {
                const content = header.nextElementSibling;
                content.classList.toggle('active');
            });
        });
        
        // 解析M3U播放列表
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = null;
            
            for (let line of lines) {
                line = line.trim();
                
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {
                        info: line,
                        name: extractChannelName(line)
                    };
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                } else if (line === '#EXTM3U') {
                    // M3U文件头，跳过
                }
            }
            
            return channels;
        }
        
        // 从EXTINF行提取频道名称
        function extractChannelName(extinfLine) {
            // EXTINF格式通常为: #EXTINF:-1 tvg-id="..." tvg-name="..." tvg-logo="..." group-title="...",频道名称
            const parts = extinfLine.split(',');
            if (parts.length > 1) {
                return parts[parts.length - 1].trim();
            }
            return '未知频道';
        }
        
        // 分类频道
        function classifyChannels(channels) {
            const result = {
                cctv: [],
                satellite: [],
                other: []
            };
            
            for (const channel of channels) {
                const name = channel.name.toUpperCase();
                
                if (name.includes('CCTV') || name.includes('CGTN')) {
                    result.cctv.push(channel);
                } else if (channel.name.includes('卫视')) {
                    result.satellite.push(channel);
                } else {
                    result.other.push(channel);
                }
            }
            
            return result;
        }
        
        // 显示分类结果
        function displayResults(classifiedChannels) {
            // 清空现有列表
            cctvList.innerHTML = '';
            satelliteList.innerHTML = '';
            otherList.innerHTML = '';
            
            // 添加央视频道
            classifiedChannels.cctv.forEach(channel => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.innerHTML = `
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-url">${channel.url}</div>
                `;
                cctvList.appendChild(li);
            });
            
            // 添加卫视频道
            classifiedChannels.satellite.forEach(channel => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.innerHTML = `
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-url">${channel.url}</div>
                `;
                satelliteList.appendChild(li);
            });
            
            // 添加其他频道
            classifiedChannels.other.forEach(channel => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.innerHTML = `
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-url">${channel.url}</div>
                `;
                otherList.appendChild(li);
            });
            
            // 更新计数
            const cctvCountValue = classifiedChannels.cctv.length;
            const satelliteCountValue = classifiedChannels.satellite.length;
            const otherCountValue = classifiedChannels.other.length;
            const totalCount = cctvCountValue + satelliteCountValue + otherCountValue;
            
            cctvCount.textContent = cctvCountValue;
            satelliteCount.textContent = satelliteCountValue;
            otherCount.textContent = otherCountValue;
            
            totalChannels.textContent = totalCount;
            cctvStat.textContent = cctvCountValue;
            satelliteStat.textContent = satelliteCountValue;
            otherStat.textContent = otherCountValue;
            
            // 展开所有分类
            cctvContent.classList.add('active');
            satelliteContent.classList.add('active');
            otherContent.classList.add('active');
        }
        
        // 清空结果
        function clearResults() {
            cctvList.innerHTML = '<li class="channel-item">暂无数据</li>';
            satelliteList.innerHTML = '<li class="channel-item">暂无数据</li>';
            otherList.innerHTML = '<li class="channel-item">暂无数据</li>';
            
            cctvCount.textContent = '0';
            satelliteCount.textContent = '0';
            otherCount.textContent = '0';
            
            totalChannels.textContent = '0';
            cctvStat.textContent = '0';
            satelliteStat.textContent = '0';
            otherStat.textContent = '0';
            
            // 收起所有分类
            cctvContent.classList.remove('active');
            satelliteContent.classList.remove('active');
            otherContent.classList.remove('active');
        }
        
        // 分类播放列表主函数
        function classifyPlaylist() {
            const content = playlistInput.value.trim();
            
            if (!content) {
                alert('请输入或上传播放列表内容！');
                return;
            }
            
            try {
                const channels = parseM3U(content);
                
                if (channels.length === 0) {
                    alert('未找到有效的频道数据，请检查播放列表格式！');
                    return;
                }
                
                const classifiedChannels = classifyChannels(channels);
                displayResults(classifiedChannels);
                
                // 显示成功消息
                showNotification(`成功分类 ${channels.length} 个频道！`);
            } catch (error) {
                alert('解析播放列表时出错：' + error.message);
            }
        }
        
        // 下载分类结果
        function downloadResults() {
            const cctvItems = cctvList.querySelectorAll('.channel-item');
            const satelliteItems = satelliteList.querySelectorAll('.channel-item');
            const otherItems = otherList.querySelectorAll('.channel-item');
            
            if (cctvItems.length === 0 && satelliteItems.length === 0 && otherItems.length === 0) {
                alert('没有可下载的数据，请先进行分类！');
                return;
            }
            
            let output = '#EXTM3U\n\n';
            
            // 央视频道
            if (cctvItems.length > 0) {
                output += '# 央视频道\n';
                cctvItems.forEach(item => {
                    const name = item.querySelector('.channel-name').textContent;
                    const url = item.querySelector('.channel-url').textContent;
                    output += `#EXTINF:-1,${name}\n${url}\n`;
                });
                output += '\n';
            }
            
            // 卫视频道
            if (satelliteItems.length > 0) {
                output += '# 卫视频道\n';
                satelliteItems.forEach(item => {
                    const name = item.querySelector('.channel-name').textContent;
                    const url = item.querySelector('.channel-url').textContent;
                    output += `#EXTINF:-1,${name}\n${url}\n`;
                });
                output += '\n';
            }
            
            // 其他频道
            if (otherItems.length > 0) {
                output += '# 其他频道\n';
                otherItems.forEach(item => {
                    const name = item.querySelector('.channel-name').textContent;
                    const url = item.querySelector('.channel-url').textContent;
                    output += `#EXTINF:-1,${name}\n${url}\n`;
                });
            }
            
            // 创建下载链接
            const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '分类后的播放列表.m3u';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('分类结果已下载！');
        }
        
        // 显示通知
        function showNotification(message) {
            // 创建一个临时通知元素
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #2e7d32;
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                font-weight: 600;
                transition: all 0.3s ease;
            `;
            
            document.body.appendChild(notification);
            
            // 3秒后自动移除
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }
        
        // 初始化页面
        clearResults();
    </script>
</body>
</html>
